<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot | Dark Mode</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #2f81f7;
            --accent-hover: #1f6feb;
            --user-msg-bg: #2f81f7;
            --ai-msg-bg: #21262d;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            background-color: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        #chat-header {
            padding: 20px;
            background-color: #010409;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        #chat-box {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #chat-box::-webkit-scrollbar {
            width: 8px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: var(--container-bg);
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        #chat-box::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-wrapper.ai {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-left: 4px;
            margin-right: 4px;
        }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .user .msg-bubble {
            background-color: var(--user-msg-bg);
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .ai .msg-bubble {
            background-color: var(--ai-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        #input-container {
            padding: 20px;
            background-color: #010409;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #user-input {
            flex-grow: 1;
            padding: 14px 20px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #user-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 1px var(--accent-color);
        }

        button {
            padding: 14px 28px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
        }
        
        button:active {
            transform: scale(0.96);
        }

        #status-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: -10px;
            margin-bottom: 10px;
            height: 15px;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">
            AI ChatBot 
        </div>
        
        <div id="chat-box">
            <div class="msg-wrapper ai">
                <div class="msg-label">AI Assistant</div>
                <div class="msg-bubble">Hello! I am connected and ready. How can I help you today?</div>
            </div>
        </div>
        
        <div id="status-text"></div>

        <div id="input-container">
            <input type="text" id="user-input" placeholder="Message the AI..." autocomplete="off" autofocus>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const statusText = document.getElementById("status-text");

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const userHtml = `
                <div class="msg-wrapper user">
                    <div class="msg-label">You</div>
                    <div class="msg-bubble">${escapeHtml(text)}</div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', userHtml);
            userInput.value = "";
            scrollToBottom();

            statusText.textContent = "AI is typing...";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                statusText.textContent = ""; 
                
                if (data.response) {
                    const formattedResponse = escapeHtml(data.response).replace(/\n/g, '<br>');
                    const aiHtml = `
                        <div class="msg-wrapper ai">
                            <div class="msg-label">AI Assistant</div>
                            <div class="msg-bubble">${formattedResponse}</div>
                        </div>
                    `;
                    chatBox.insertAdjacentHTML('beforeend', aiHtml);
                } else {
                    renderError(data.error);
                }
            } catch (err) {
                statusText.textContent = "";
                renderError("Network request failed. Is the server running?");
            }
            scrollToBottom();
        }

        function renderError(message) {
            const errorHtml = `
                <div class="msg-wrapper ai">
                    <div class="msg-label">System Error</div>
                    <div class="msg-bubble" style="color: #ff7b72; border-color: #ff7b72;">${escapeHtml(message)}</div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', errorHtml);
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
